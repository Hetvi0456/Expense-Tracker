<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <header>
            <h1>Expense Tracker</h1>
        </header>

        <section class="summary">
            <div class="total-box">
                <p>Total Expenses:</p>
                <h2 id="total-amount">$0.00</h2>
            </div>
        </section>

        <section class="expense-form">
            <h2>Add Expense</h2>
            <form id="expense-form">
                <input type="text" id="expense-name" title="Expense Name" placeholder="e.g. Groceries" required>
                <input type="number" id="expense-amount" title="Amount ($)" placeholder="e.g. 50.00" required>
                <select id="expense-category" title="Category" required>
                    <option value="" disabled selected>Select Category</option>
                    <option value="Food">Food</option>
                    <option value="Transportation">Transportation</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Utilities">Utilities</option>
                </select>
                <input type="date" id="expense-date" title="Date" required>
                <button type="submit">+ Add Expense</button>
            </form>
        </section>

        <section class="controls">
            <div class="search-box">

            </div>
            <div class="filter-box">

            </div>
        </section>

        <section class="expense-list">
            <table>
                <thead>
                    <tr>
                        <th>Expense</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Amount</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="expense-list">
                    <!-- Expense items -->

                </tbody>
            </table>
        </section>

    </div>

    <script src="script.js"></script>
</body>

</html>
