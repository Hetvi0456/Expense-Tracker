<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <header>
            <h1>Expense Tracker</h1>
        </header>

        <section class="summary">
            <div class="total-box">
                <p>Total Expenses:</p>
                <h2 id="total-amount">$0.00</h2>
            </div>
        </section>

        <section class="expense-form">
            <h2>Add Expense</h2>

            <form id="expense-form">
                <div class="form-group">
                    <label for="expense-name">Expense Name</label>
                    <input type="text" id="expense-name" placeholder="e.g. Groceries" required>
                </div>
                <div class="form-group">
                    <label for="expense-amount">Amount ($)</label>
                    <input type="number" id="expense-amount" placeholder="e.g. 50.00" required>
                </div>
                <div class="form-group">
                    <label for="expense-category">Category</label>
                    <select id="expense-category" required>
                        <option value="" disabled selected>Select Category</option>
                        <option value="Food">Food</option>
                        <option value="Transportation">Transportation</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Utilities">Utilities</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="expense-date">Date</label>
                    <input type="date" id="expense-date" required>
                </div>
                <button type="submit">+ Add Expense</button>
            </form>
        </section>

        <section class="controls">
            <div class="search-box"></div>
            <div class="filter-box"></div>
        </section>

        <section class="expense-list">
            <table aria-label="Expense List">
                <thead>
                    <tr>
                        <th>Expense</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Amount</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="expense-list">
                    <!-- Expense items -->

                </tbody>
            </table>
        </section>

    </div>

    <script src="script.js"></script>
</body>

</html>
